<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dead Heat</title>
  <link rel="stylesheet" href="styles.css?v=25b" />
</head>
<body class="bg-art">
  <div class="app">
    <header class="hero">
      <div class="eyebrow">Crime 004</div>
      <h1 id="heroTitle">Dead Heat</h1>
      <div class="difficulty" id="difficultyLabel">Difficulty: Senior Detective</div>
      <p class="sub" id="heroSub"></p>
      <div class="hero-top-image">
        <img src="./case_004_dead_heat.png" alt="Case 004 Dead Heat hero art">
      </div>
      <div class="hero-storyline" id="heroStoryline"></div>
      <div class="hero-instructions" id="heroInstructions"></div>
      <div class="start-wrap">
        <button id="startBtn" class="start-btn">Start</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar card">
        <section class="side-section">
          <div class="side-title">Active Run</div>
          <div class="score">
            <div class="mini"><span class="tiny">Round</span><strong id="roundLabel">—</strong></div>
          </div>
        </section>

        <section class="side-section">
          <div class="side-title">Navigation</div>
          <div class="nav" id="mainNav"></div>
        </section>

        <section class="side-section">
          <div class="side-title">Actions</div>
          <div class="actions" id="actionButtons">
            <button class="smallbtn" id="hintBtn">Use Hint</button>
            <button class="smallbtn" id="checkpointBtn">Checkpoint</button>
          </div>
          <div class="notice" id="hintBox" hidden></div>
        </section>
      </aside>

      <main class="main card">
        <section class="panel" id="panel">
          <div class="empty">Loading case…</div>
        </section>
      </main>
    </div>
  </div>
  <script src="app.js?v=25b"></script>
</body>
</html>
